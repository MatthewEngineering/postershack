name: Terraform

on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "app3/terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "plan or apply"
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]

defaults:
  run:
    working-directory: app3/terraform

jobs:
  terraform:
    name: Terraform ${{ inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init
        env:
          TF_VAR_hf_token: ${{ secrets.HF_TOKEN }}

      - name: Terraform plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_hf_token: ${{ secrets.HF_TOKEN }}

      - name: Terraform apply
        if: ${{ inputs.action != 'plan' && (inputs.action == 'apply' || github.event_name == 'push') }}
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_hf_token: ${{ secrets.HF_TOKEN }}

      - name: Terraform destroy
        if: ${{ inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
        env:
          TF_VAR_hf_token: ${{ secrets.HF_TOKEN }}


#### ---------------- Configuring Azure credentials for GitHub Actions

### ----- gather tenant and subscription IDs (from your current login)
# secrets.AZURE_SUBSCRIPTION_ID
# secrets.AZURE_TENANT_ID

# # Tenant and Subscription IDs (from your current login)
# az account show --query "{subscriptionId:id, tenantId:tenantId}" -o table



### ----- create service principal (basically the identity that GitHub Actions will use to authenticate with Azure)
# https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps/ApplicationsListBlade

# secrets.AZURE_CLIENT_ID

## Client ID (the service principal you want GitHub to use)
